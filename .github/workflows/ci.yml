name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  zig:
    name: Zig backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install libpq
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Unit tests
        run: zig build test

      - name: Native build
        run: zig build

  compose:
    name: Docker compose build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Placeholder secrets (build-only)
        run: |
          mkdir -p docker/secrets
          for f in db_password db_write_password db_read_password jwt_secret \
                   api_password mqtt_controller_user mqtt_controller_password ca_cert; do
            touch "docker/secrets/$f.txt"
          done

      - name: Build all services
        run: docker compose -f docker/docker-compose.yml --profile tools build
