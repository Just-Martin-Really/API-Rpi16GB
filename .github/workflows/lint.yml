name: Lint

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  python:
    name: Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          src: "./docker/controller ./lstm"

  shell:
    name: Shell (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: error

  docker:
    name: Dockerfiles (hadolint)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - docker/archiver/Dockerfile
          - docker/backend/Dockerfile
          - docker/controller/Dockerfile
          - docker/lstm/Dockerfile
          - docker/seeder/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          failure-threshold: error

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/
      - name: Run gitleaks
        run: gitleaks detect --no-banner --redact --verbose --exit-code 1
