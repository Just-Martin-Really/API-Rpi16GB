listener 8883
protocol mqtt

# TLS — certs provisioned by scripts/setup_tls.sh
cafile   /mosquitto/ssl/ca.crt
certfile /mosquitto/ssl/broker.crt
keyfile  /mosquitto/ssl/broker.key
tls_version tlsv1.2

# No anonymous access
allow_anonymous false
password_file /mosquitto/config/passwd

# Per-sensor and controller ACLs
acl_file /mosquitto/config/acl
