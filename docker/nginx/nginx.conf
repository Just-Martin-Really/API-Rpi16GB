events {
    worker_connections 1024;
}

http {
    # Rate limit: 30 requests/minute per client IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # Redirect all HTTP to HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/backend.crt;
        ssl_certificate_key /etc/nginx/ssl/backend.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Accept traffic from Production WLAN and internal Docker bridge networks
        allow 192.168.50.0/24;
        allow 172.16.0.0/12;
        deny  all;

        location /health {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
        }

        location /auth/ {
            limit_req zone=api burst=5 nodelay;
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
