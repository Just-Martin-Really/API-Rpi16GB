# Project-specific OWASP CRS false-positive exclusions.
#
# Reviewed against the Phase 6 surfaces. The exclusions below are scoped
# by REQUEST_URI prefix so they apply only on the routes that legitimately
# carry the offending bytes.
#
# Add SecRuleRemoveById / SecRuleRemoveByTag / SecRuleUpdateTargetById
# here after reviewing the audit log (`docker logs nginx | jq`) under
# DetectionOnly. Each exclusion MUST cite the CRS rule ID it disables
# and the legitimate request that triggered it. Rule IDs 90000-99999
# are reserved by CRS for site-specific exclusions; project rules sit in
# 1000000-1999999 (see custom-rules.conf).
#
# Tracked false-positive surfaces:
#   - Authorization: Bearer <jwt> headers on every /api/v1/* request.
#     The base64url segments and dot separators in a JWT trigger
#     CRS 920274 (invalid characters in request header) on long tokens.
#   - JSON POST bodies on /api/v1/sensor-data, /api/v1/actuator-command,
#     /api/v1/sensor-request and their /sent siblings. The JSON brace
#     and quote characters plus IDs containing dashes trigger CRS 942100
#     (SQLi libinjection) and 942130 (SQL boolean) at paranoia level 1.
#   - /auth/realms/iot/protocol/openid-connect/* — Keycloak browser flow
#     bounces base64 state and code values that trip CRS 941100 (XSS).

# JWT bearer-header false positives across the whole /api/v1/* surface.
SecRule REQUEST_URI "@beginsWith /api/v1/" \
    "id:90100,phase:1,nolog,pass,\
     ctl:ruleRemoveTargetById=920274;REQUEST_HEADERS:Authorization,\
     ctl:ruleRemoveTargetById=921180;REQUEST_HEADERS:Authorization"

# JSON-body libinjection / SQLi false positives on the four POST endpoints
# that take a JSON payload.
SecRule REQUEST_URI "@beginsWith /api/v1/sensor-data" \
    "id:90110,phase:2,nolog,pass,\
     ctl:ruleRemoveTargetById=942100;ARGS_NAMES,\
     ctl:ruleRemoveTargetById=942100;REQUEST_BODY,\
     ctl:ruleRemoveTargetById=942130;REQUEST_BODY,\
     ctl:ruleRemoveTargetById=942260;REQUEST_BODY"

SecRule REQUEST_URI "@beginsWith /api/v1/actuator-command" \
    "id:90111,phase:2,nolog,pass,\
     ctl:ruleRemoveTargetById=942100;ARGS_NAMES,\
     ctl:ruleRemoveTargetById=942100;REQUEST_BODY,\
     ctl:ruleRemoveTargetById=942130;REQUEST_BODY,\
     ctl:ruleRemoveTargetById=942260;REQUEST_BODY"

SecRule REQUEST_URI "@beginsWith /api/v1/sensor-request" \
    "id:90112,phase:2,nolog,pass,\
     ctl:ruleRemoveTargetById=942100;ARGS_NAMES,\
     ctl:ruleRemoveTargetById=942100;REQUEST_BODY,\
     ctl:ruleRemoveTargetById=942130;REQUEST_BODY,\
     ctl:ruleRemoveTargetById=942260;REQUEST_BODY"

# Keycloak browser flow: bounces base64 state/code values whose
# characters trip CRS 941100 (XSS heuristic). Apply only on the OIDC
# protocol subtree, not on /auth/admin or /auth/realms/iot/account
# where script tags would be a real signal.
SecRule REQUEST_URI "@beginsWith /auth/realms/iot/protocol/" \
    "id:90120,phase:1,nolog,pass,\
     ctl:ruleRemoveTargetById=941100;ARGS:state,\
     ctl:ruleRemoveTargetById=941100;ARGS:code,\
     ctl:ruleRemoveTargetById=941100;ARGS:session_state"
