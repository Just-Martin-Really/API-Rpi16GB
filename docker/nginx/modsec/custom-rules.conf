# Kap4 slide 4-19 demonstration rule: reflected XSS in REQUEST_URI.
# Lowercases and strips whitespace before checking for the literal "<script>".
SecRule REQUEST_URI "@contains <script>" \
    "id:1000,\
    phase:1,\
    t:lowercase,t:removeWhitespace,\
    deny,log,\
    msg:'XSS attack detected'"
