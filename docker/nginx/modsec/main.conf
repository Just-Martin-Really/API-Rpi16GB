# Kap4 4.2 ModSecurity include chain.
# Order: image base config -> project custom rules -> project exclusions.

Include /etc/modsecurity.d/modsecurity.conf
Include /etc/modsecurity.d/modsecurity-override.conf
Include /etc/modsecurity.d/setup.conf

Include /etc/nginx/modsec/custom-rules.conf
Include /etc/nginx/modsec/exclusions.conf