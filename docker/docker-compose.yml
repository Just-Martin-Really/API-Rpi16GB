networks:
  app-net:
    driver: bridge
  sensor-net:
    driver: bridge

volumes:
  postgres_data:

secrets:
  db_password:
    file: ./secrets/db_password.txt
  db_write_password:
    file: ./secrets/db_write_password.txt
  db_read_password:
    file: ./secrets/db_read_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  mqtt_controller_user:
    file: ./secrets/mqtt_controller_user.txt
  mqtt_controller_password:
    file: ./secrets/mqtt_controller_password.txt
  ca_cert:
    file: ./secrets/ca_cert.txt

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sensor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app-net
    # Not exposed to the host — only reachable inside app-net

  # ── Zig backend ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: sensor
    secrets:
      - db_write_password
      - db_read_password
      - jwt_secret
    networks:
      - app-net
    depends_on:
      - postgres

  # ── nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # TLS cert + key are provisioned on the host by the CA setup step
      - /etc/ssl/backend/backend.crt:/etc/nginx/ssl/backend.crt:ro
      - /etc/ssl/backend/backend.key:/etc/nginx/ssl/backend.key:ro
    networks:
      - app-net
    depends_on:
      - backend

  # ── MQTT broker ────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "8883:8883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/acl:/mosquitto/config/acl:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd:rw
      - ./mosquitto/ssl:/mosquitto/ssl:ro
    networks:
      - sensor-net
      - app-net

  # ── Archiver (sensor_data → sensor_data_archive, daily) ───────────────────
  archiver:
    build:
      context: archiver
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_NAME: sensor
    secrets:
      - db_write_password
    networks:
      - app-net
    depends_on:
      - postgres

  # ── Seeder (fake-data generator, on-demand only) ──────────────────────────
  # Not started by `docker compose up` — opt-in via the "tools" profile:
  #   docker compose --profile tools run --rm seeder --rows 10000 --days 30
  seeder:
    build:
      context: seeder
      dockerfile: Dockerfile
    profiles: ["tools"]
    environment:
      DB_HOST: postgres
      DB_NAME: sensor
    secrets:
      - db_write_password
    networks:
      - app-net
    depends_on:
      - postgres

  # ── Controller (MQTT → DB bridge) ─────────────────────────────────────────
  controller:
    build:
      context: controller
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "8883"
      DB_HOST: postgres
      DB_NAME: sensor
    secrets:
      - db_write_password
      - mqtt_controller_user
      - mqtt_controller_password
      - ca_cert
    networks:
      - app-net
      - sensor-net
    depends_on:
      - postgres
      - mosquitto
