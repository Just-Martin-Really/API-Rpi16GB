networks:
  app-net:
    driver: bridge
  sensor-net:
    driver: bridge

volumes:
  postgres_data:
  keycloak_db_data:

secrets:
  db_password:
    file: ./secrets/db_password.txt
  db_write_password:
    file: ./secrets/db_write_password.txt
  db_read_password:
    file: ./secrets/db_read_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  mqtt_controller_user:
    file: ./secrets/mqtt_controller_user.txt
  mqtt_controller_password:
    file: ./secrets/mqtt_controller_password.txt
  ca_cert:
    file: ./secrets/ca_cert.txt
  api_key:
    file: ./secrets/api_key.txt
  dashboard_lstm_password:
    file: ./secrets/dashboard_lstm_password.txt
  keycloak_db_password:
    file: ./secrets/keycloak_db_password.txt
  keycloak_admin_password:
    file: ./secrets/keycloak_admin_password.txt

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sensor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app-net
    # Not exposed to the host — only reachable inside app-net

  # ── Zig backend ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: sensor
    secrets:
      - db_write_password
      - db_read_password
      - jwt_secret
    networks:
      - app-net
    depends_on:
      - postgres

  # ── nginx reverse proxy + ModSecurity WAF + OWASP CRS (Kap4 4.2) ─────────
  nginx:
    image: owasp/modsecurity-crs:nginx-alpine
    restart: unless-stopped
    ports:
      - "80:8080"
      - "443:8443"
    environment:
      # Network & TLS
      SERVER_NAME: backend.lab.local
      PORT: "8080"
      SSL_PORT: "8443"
      BACKEND: "http://backend:8080"
      SSL_CERT_FILE: /etc/nginx/ssl/backend.crt
      SSL_CERT_KEY_FILE: /etc/nginx/ssl/backend.key
      SSL_PROTOCOLS: "TLSv1.2 TLSv1.3"
      # ModSecurity / OWASP CRS. Starting in DetectionOnly; flip to "On"
      # after reviewing the audit log under real traffic.
      MODSEC_RULE_ENGINE: DetectionOnly
      MODSEC_AUDIT_ENGINE: RelevantOnly
      MODSEC_AUDIT_LOG_FORMAT: JSON
      MODSEC_AUDIT_LOG: /dev/stdout
      MODSEC_REQ_BODY_ACCESS: "On"
      MODSEC_RESP_BODY_ACCESS: "Off"
      BLOCKING_PARANOIA: "1"
      DETECTION_PARANOIA: "1"
      ANOMALY_INBOUND: "5"
      ANOMALY_OUTBOUND: "4"
    volumes:
      # Replace the image's default server template so we keep our
      # rate-limit zone, subnet allowlist, and per-path locations.
      - ./nginx/templates/conf.d/default.conf.template:/etc/nginx/templates/conf.d/default.conf.template:ro
      # ModSecurity include chain + custom rule + FP exclusions stub.
      - ./nginx/modsec/main.conf:/etc/nginx/modsec/main.conf:ro
      - ./nginx/modsec/custom-rules.conf:/etc/nginx/modsec/custom-rules.conf:ro
      - ./nginx/modsec/exclusions.conf:/etc/nginx/modsec/exclusions.conf:ro
      # TLS cert + key are provisioned on the host by the CA setup step
      - /etc/ssl/backend/backend.crt:/etc/nginx/ssl/backend.crt:ro
      - /etc/ssl/backend/backend.key:/etc/nginx/ssl/backend.key:ro
    networks:
      app-net:
        aliases:
          - backend.lab.local
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "8443"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    depends_on:
      - backend

  # ── MQTT broker ────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "8883:8883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/acl:/mosquitto/config/acl:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd:rw
      - ./mosquitto/ssl:/mosquitto/ssl:ro
    networks:
      - sensor-net
      - app-net

  # ── Archiver (sensor_data → sensor_data_archive, daily) ───────────────────
  archiver:
    build:
      context: archiver
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_NAME: sensor
    secrets:
      - db_write_password
    networks:
      - app-net
    depends_on:
      - postgres

  # ── Seeder (fake-data generator, on-demand only) ──────────────────────────
  # Not started by `docker compose up` — opt-in via the "tools" profile:
  #   docker compose --profile tools run --rm seeder --rows 10000 --days 30
  seeder:
    build:
      context: seeder
      dockerfile: Dockerfile
    profiles: ["tools"]
    environment:
      DB_HOST: postgres
      DB_NAME: sensor
    secrets:
      - db_write_password
    networks:
      - app-net
    depends_on:
      - postgres

  # ── Controller (MQTT → DB bridge) ─────────────────────────────────────────
  controller:
    build:
      context: controller
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "8883"
      API_BASE_URL: https://nginx:8443
    secrets:
      - mqtt_controller_user
      - mqtt_controller_password
      - ca_cert
      - api_key
    networks:
      - app-net
      - sensor-net
    depends_on:
      nginx:
        condition: service_healthy
      mosquitto:
        condition: service_started

  # ── Webserver ─────────────────────────────────────────
  webserver:
    build:
      context: ./webserver
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: sensor
      DB_USER: iot_write_user
    secrets:
      - db_write_password
      - api_key
    networks:
      - app-net
    depends_on:
      - postgres

  # ── LSTM control loop (predict + post heater/cooler commands) ─────────────
  lstm:
    build:
      context: ..
      dockerfile: docker/lstm/Dockerfile
    restart: unless-stopped
    environment:
      API_BASE_URL: https://backend.lab.local:8443
      API_CA_CERT: /run/secrets/ca_cert
      LSTM_USER: lstm
      LSTM_PASS_FILE: /run/secrets/dashboard_lstm_password
      DATA_SOURCE: api
      API_DAYS: "7"
      TARGET_LOW: "19.0"
      TARGET_HIGH: "23.0"
      LOOKAHEAD: "30"
      LOOP_SECONDS: "60"
      ACTUATOR_HEATER_ID: heater01
      ACTUATOR_COOLER_ID: cooler01
    secrets:
      - ca_cert
      - dashboard_lstm_password
    networks:
      - app-net
    depends_on:
      nginx:
        condition: service_healthy

  # ── Keycloak DB (dedizierte Postgres-Instanz für Keycloak) ───────────────────
  keycloak-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD_FILE: /run/secrets/keycloak_db_password
    secrets:
      - keycloak_db_password
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Keycloak Identity & Access Management ────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: keycloak_server
    command: start-dev --import-realm
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD_FILE: /run/secrets/keycloak_db_password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD_FILE: /run/secrets/keycloak_admin_password
    secrets:
      - keycloak_db_password
      - keycloak_admin_password
    volumes:
      - ./keycloak/iot-realm.json:/opt/keycloak/data/import/iot-realm.json:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/realms/master || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - app-net
