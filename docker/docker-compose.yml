networks:
  app-net:
    driver: bridge
  sensor-net:
    driver: bridge

volumes:
  postgres_data:

secrets:
  db_password:
    file: ./secrets/db_password.txt
  db_write_password:
    file: ./secrets/db_write_password.txt
  db_read_password:
    file: ./secrets/db_read_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  mqtt_controller_user:
    file: ./secrets/mqtt_controller_user.txt
  mqtt_controller_password:
    file: ./secrets/mqtt_controller_password.txt
  ca_cert:
    file: ./secrets/ca_cert.txt
  api_key:
    file: ./secrets/api_key.txt

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sensor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app-net
    # Not exposed to the host — only reachable inside app-net

  # ── Zig backend ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: sensor
    secrets:
      - db_write_password
      - db_read_password
      - jwt_secret
    networks:
      - app-net
    depends_on:
      - postgres

  # ── nginx reverse proxy + ModSecurity WAF + OWASP CRS (Kap4 4.2) ─────────
  nginx:
    image: owasp/modsecurity-crs:nginx-alpine
    restart: unless-stopped
    ports:
      - "80:8080"
      - "443:8443"
    environment:
      # Network & TLS
      SERVER_NAME: backend.lab.local
      PORT: "8080"
      SSL_PORT: "8443"
      BACKEND: "http://backend:8080"
      SSL_CERT_FILE: /etc/nginx/ssl/backend.crt
      SSL_CERT_KEY_FILE: /etc/nginx/ssl/backend.key
      SSL_PROTOCOLS: "TLSv1.2 TLSv1.3"
      # ModSecurity / OWASP CRS. Starting in DetectionOnly; flip to "On"
      # after reviewing the audit log under real traffic.
      MODSEC_RULE_ENGINE: DetectionOnly
      MODSEC_AUDIT_ENGINE: RelevantOnly
      MODSEC_AUDIT_LOG_FORMAT: JSON
      MODSEC_AUDIT_LOG: /dev/stdout
      MODSEC_REQ_BODY_ACCESS: "On"
      MODSEC_RESP_BODY_ACCESS: "Off"
      BLOCKING_PARANOIA: "1"
      DETECTION_PARANOIA: "1"
      ANOMALY_INBOUND: "5"
      ANOMALY_OUTBOUND: "4"
    volumes:
      # Replace the image's default server template so we keep our
      # rate-limit zone, subnet allowlist, and per-path locations.
      - ./nginx/templates/conf.d/default.conf.template:/etc/nginx/templates/conf.d/default.conf.template:ro
      # ModSecurity include chain + custom rule + FP exclusions stub.
      - ./nginx/modsec/main.conf:/etc/nginx/modsec/main.conf:ro
      - ./nginx/modsec/custom-rules.conf:/etc/nginx/modsec/custom-rules.conf:ro
      - ./nginx/modsec/exclusions.conf:/etc/nginx/modsec/exclusions.conf:ro
      # TLS cert + key are provisioned on the host by the CA setup step
      - /etc/ssl/backend/backend.crt:/etc/nginx/ssl/backend.crt:ro
      - /etc/ssl/backend/backend.key:/etc/nginx/ssl/backend.key:ro
    networks:
      - app-net
    depends_on:
      - backend

  # ── MQTT broker ────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "8883:8883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/acl:/mosquitto/config/acl:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd:rw
      - ./mosquitto/ssl:/mosquitto/ssl:ro
    networks:
      - sensor-net
      - app-net

  # ── Archiver (sensor_data → sensor_data_archive, daily) ───────────────────
  archiver:
    build:
      context: archiver
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_NAME: sensor
    secrets:
      - db_write_password
    networks:
      - app-net
    depends_on:
      - postgres

  # ── Seeder (fake-data generator, on-demand only) ──────────────────────────
  # Not started by `docker compose up` — opt-in via the "tools" profile:
  #   docker compose --profile tools run --rm seeder --rows 10000 --days 30
  seeder:
    build:
      context: seeder
      dockerfile: Dockerfile
    profiles: ["tools"]
    environment:
      DB_HOST: postgres
      DB_NAME: sensor
    secrets:
      - db_write_password
    networks:
      - app-net
    depends_on:
      - postgres

  # ── Controller (MQTT → DB bridge) ─────────────────────────────────────────
  controller:
    build:
      context: controller
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "8883"
      API_BASE_URL: https://nginx:8443
    secrets:
      - mqtt_controller_user
      - mqtt_controller_password
      - ca_cert
      - api_key
    networks:
      - app-net
      - sensor-net
    depends_on:
      - nginx
      - mosquitto

  # ── Webserver ─────────────────────────────────────────
  webserver:
    build:
      context: ./webserver
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: sensor
      DB_USER: iot_write_user
    secrets:
      - db_write_password
      - api_key
    networks:
      - app-net
    depends_on:
      - postgres
