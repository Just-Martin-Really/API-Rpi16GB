# Gitleaks config for API-Rpi16GB.
#
# Extends the default rule set with a path-based allowlist for JWT test
# fixtures. The fixtures are signed against a throwaway RSA keypair
# generated by scripts/genjwt.py specifically for the auth.zig unit
# tests; no production token, signing key, or grant ever touches them.

[extend]
useDefault = true

[[allowlists]]
description = "JWT fixtures for auth.zig unit tests (throwaway keypair)"
paths = [
    '''src/auth_test_fixtures\.zig''',
]
